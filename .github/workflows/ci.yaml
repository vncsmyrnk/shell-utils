name: CI workflow

on:
  push:
    branches: [ "main" ]

jobs:
  ci-nix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Check flake
        run: nix flake check

      - name: Build flake
        run: nix build .# -L

  ci-pkgbuild:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Arch Package
        uses: edlanglois/pkgbuild-action@v1
        with:
          namcap: true
