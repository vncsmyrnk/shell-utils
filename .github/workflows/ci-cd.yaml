name: CI/CD workflow

on:
  push:
    branches: [ "main" ]

jobs:
  ci-nix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Check flake
        run: nix flake check

      - name: Build flake
        run: nix build .# -L

  ci-pkgbuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for PKGBUILD changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            pkgbuild:
              - 'PKGBUILD'

      - name: Build Arch Package
        uses: edlanglois/pkgbuild-action@v1
        with:
          namcap: true

  ci-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y ripgrep

      - uses: extractions/setup-just@v1

      - name: Shellcheck
        run: just shellcheck

  update-pkgbuild:
    needs: [ci-pkgbuild, ci-scripts]
    if: ${{ needs.ci-pkgbuild.outputs.pkgbuild == 'true' && !contains(github.event.head_commit.message, '[skip-cd]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for PKGBUILD changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            pkgbuild:
              - 'PKGBUILD'

      - name: Publish AUR package
        if: steps.filter.outputs.pkgbuild == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: shell-utils-git
          pkgbuild: ./PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update AUR package"
          ssh_keyscan_types: rsa,ecdsa,ed25519

  update-apt:
    needs: [ci-nix, ci-scripts]
    if: ${{ !contains(github.event.head_commit.message, '[skip-cd]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - uses: extractions/setup-just@v4

      - name: Build
        run: just build

      - name: Install packaging dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ruby ruby-dev rubygems build-essential
          sudo gem install fpm

      - name: Package it using fpm
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          COMMIT_HASH=$(git rev-parse --short HEAD)
          DYNAMIC_VERSION="1.0.0+git${COMMIT_COUNT}.${COMMIT_HASH}"

          mkdir -p staging-root/usr/bin staging-root/usr/share/shell-utils/scripts \
            staging-root/usr/share/zsh/vendor-completions staging-root/usr/share/man/man1

          cp ./dist/* staging-root/usr/bin/
          cp -a extra/* staging-root/usr/share/shell-utils/scripts/
          cp -a completions/zsh/_util staging-root/usr/share/zsh/vendor-completions/
          cp -a completions/zsh/*.completions.zsh staging-root/usr/share/shell-utils/scripts/
          cp -a man/* staging-root/usr/share/man/man1/

          fpm -s dir -t deb \
            -n shell-utils \
            -v $DYNAMIC_VERSION \
            -a amd64 \
            --maintainer "Vinicius Mayrink <vncsmyrnk@gmail.com>" \
            --description "An attempt to be a shell-agnostic custom utilities tool." \
            --license "GPL-3.0" \
            --url "https://github.com/vncsmyrnk/shell-utils" \
            -C staging-root .

      - name: Upload to Gemfury
        run: |
          DEB_FILE=$(find . -name '*.deb' -type f | head -n 1)
          curl -F package=@$DEB_FILE https://${{ secrets.GEMFURY_PUSH_TOKEN }}@push.fury.io/vncsmyrnk
